<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BasketAI — Market Basket Intelligence</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #050810;
  --surface: #0c1120;
  --surface2: #111827;
  --border: rgba(99,179,255,0.12);
  --accent: #3b82f6;
  --accent2: #06b6d4;
  --accent3: #8b5cf6;
  --gold: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --glass: rgba(15,23,42,0.7);
}
.light {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f8faff;
  --border: rgba(59,130,246,0.15);
  --text: #0f172a;
  --muted: #64748b;
  --glass: rgba(255,255,255,0.8);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

/* GRID BG */
.grid-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}
.orb {
  position: fixed; border-radius: 50%; filter: blur(80px);
  pointer-events: none; z-index: 0; opacity: 0.3;
}
.orb1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; }
.orb2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -50px; right: -50px; }
.orb3 { width: 200px; height: 200px; background: #06b6d4; top: 40%; left: 40%; }

/* LAYOUT */
.app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }
.navbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
  background: var(--glass); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nav-links { display: flex; gap: 4px; }
.nav-btn {
  padding: 6px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
  background: transparent; color: var(--muted); transition: all 0.2s;
}
.nav-btn:hover { color: var(--text); background: var(--surface2); }
.nav-btn.active { color: var(--accent); background: rgba(59,130,246,0.12); }
.theme-btn {
  width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--accent); }
.main { flex: 1; padding: 32px; max-width: 1400px; margin: 0 auto; width: 100%; }

/* CARDS */
.card {
  background: var(--glass); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 16px;
  padding: 24px; transition: border-color 0.2s;
}
.card:hover { border-color: rgba(59,130,246,0.3); }
.card-title {
  font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
  color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 14px;
  padding: 20px; position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--text); margin: 4px 0; }
.stat-sub { font-size: 0.75rem; color: var(--muted); }

/* BADGES */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
}
.badge-blue { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
.badge-green { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.badge-purple { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
.badge-gold { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
.badge-red { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.badge-cyan { background: rgba(6,182,212,0.15); color: #22d3ee; border: 1px solid rgba(6,182,212,0.3); }

/* BUTTONS */
.btn {
  padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, #3b82f6, #06b6d4); color: white;
  box-shadow: 0 4px 20px rgba(59,130,246,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(59,130,246,0.4); }
.btn-secondary {
  background: var(--surface2); color: var(--text); border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost { background: transparent; color: var(--muted); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* INPUTS */
.input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; width: 100%; outline: none; transition: border-color 0.2s;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.input::placeholder { color: var(--muted); }
.range-input { width: 100%; accent-color: var(--accent); }

/* RULES TABLE */
.rules-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.rules-table th {
  text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border);
  color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.72rem;
}
.rules-table td { padding: 10px 12px; border-bottom: 1px solid rgba(99,179,255,0.05); }
.rules-table tr:hover td { background: rgba(59,130,246,0.04); }
.lift-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; min-width: 60px; }
.lift-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #3b82f6, #06b6d4); }

/* PROGRESS */
.progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, #3b82f6, #06b6d4);
  transition: width 0.5s ease;
}

/* DRAG DROP CART */
.cart-area {
  min-height: 120px; border: 2px dashed var(--border); border-radius: 14px;
  padding: 16px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
  transition: border-color 0.2s, background 0.2s;
}
.cart-area.drag-over { border-color: var(--accent); background: rgba(59,130,246,0.05); }
.product-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
  cursor: grab; user-select: none; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.product-chip:hover { transform: scale(1.05); }
.product-chip:active { cursor: grabbing; }
.chip-blue { background: rgba(59,130,246,0.2); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
.chip-purple { background: rgba(139,92,246,0.2); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.3); }
.chip-cyan { background: rgba(6,182,212,0.2); color: #67e8f9; border: 1px solid rgba(6,182,212,0.3); }
.chip-green { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
.chip-gold { background: rgba(245,158,11,0.2); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }

/* RECOMMENDATION CARD */
.rec-card {
  border: 1px solid var(--border); border-radius: 12px; padding: 16px;
  background: var(--surface2); transition: all 0.2s;
  display: flex; flex-direction: column; gap: 8px;
}
.rec-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.rec-card .rec-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
.rec-card .rec-explain { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
.metric-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* NETWORK GRAPH */
.graph-container { position: relative; width: 100%; height: 400px; overflow: hidden; border-radius: 12px; background: var(--surface2); }
.graph-svg { width: 100%; height: 100%; }
.node-circle { cursor: pointer; transition: all 0.2s; }
.node-circle:hover { filter: brightness(1.3); }
.edge-line { stroke-opacity: 0.4; transition: stroke-opacity 0.2s; }

/* TABS */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab {
  padding: 8px 18px; border: none; background: transparent; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
  color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s;
  margin-bottom: -1px;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* ALGO CARDS */
.algo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
.algo-card {
  border: 1px solid var(--border); border-radius: 14px; padding: 20px;
  background: var(--surface2); position: relative; overflow: hidden;
}
.algo-card .algo-name {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
  margin-bottom: 12px;
}
.algo-metric { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.algo-metric-label { font-size: 0.78rem; color: var(--muted); }
.algo-metric-value { font-weight: 700; font-size: 0.9rem; }
.algo-glow { position: absolute; top: 0; right: 0; width: 80px; height: 80px; border-radius: 50%; filter: blur(40px); opacity: 0.3; }

/* UPLOAD ZONE */
.upload-zone {
  border: 2px dashed var(--border); border-radius: 16px; padding: 48px;
  text-align: center; cursor: pointer; transition: all 0.2s;
}
.upload-zone:hover { border-color: var(--accent); background: rgba(59,130,246,0.04); }
.upload-zone.drag-over { border-color: var(--accent); background: rgba(59,130,246,0.08); }
.upload-icon { font-size: 3rem; margin-bottom: 16px; }

/* ANIMATION */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
.anim-fade { animation: fadeIn 0.4s ease forwards; }
.anim-slide { animation: slideIn 0.3s ease forwards; }
.spinner { animation: spin 1s linear infinite; }
.pulse { animation: pulse 2s infinite; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* TOOLTIP */
.tooltip {
  position: absolute; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; font-size: 0.78rem; z-index: 1000;
  pointer-events: none; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

/* GRID LAYOUTS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
@media(max-width:900px) { .grid-2,.grid-3 { grid-template-columns: 1fr; } }

/* SEGMENT BARS */
.seg-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.seg-label { font-size: 0.82rem; min-width: 140px; color: var(--text); }
.seg-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.seg-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.seg-count { font-size: 0.78rem; color: var(--muted); min-width: 30px; text-align: right; }

/* STATUS INDICATOR */
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-green { background: #10b981; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite; }
.dot-yellow { background: #f59e0b; animation: pulse 1s infinite; }
.dot-red { background: #ef4444; }
.dot-gray { background: var(--muted); }

/* TRAIN SECTION */
.param-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.param-label { font-size: 0.82rem; color: var(--muted); display: flex; justify-content: space-between; }
.param-value { font-weight: 700; color: var(--accent); }

/* DRAG CHIP ANIMATE */
.chip-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.8rem; padding: 0 2px; }
.chip-remove:hover { color: var(--red); }

select.input { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { LineChart, Line, BarChart, Bar, ScatterChart, Scatter,
        XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
        RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
        AreaChart, Area } = Recharts;

const API = "http://localhost:8000";

// ── Utility ─────────────────────────────────
const fmt = (n, d=2) => typeof n === 'number' ? n.toFixed(d) : n;
const chipColors = ['chip-blue','chip-purple','chip-cyan','chip-green','chip-gold'];
const chipFor = (i) => chipColors[i % chipColors.length];
const algoColors = { Apriori: '#3b82f6', 'FP-Growth': '#06b6d4', ECLAT: '#8b5cf6' };

// ── API Hooks ────────────────────────────────
function useApi(path, deps=[]) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (!path) return;
    setLoading(true);
    fetch(API + path)
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, deps);

  return { data, loading, error };
}

// ── Components ───────────────────────────────

function StatusBadge({ status }) {
  const map = { ready: ['dot-green','Ready'], training: ['dot-yellow','Training...'], idle: ['dot-gray','Idle'], error: ['dot-red','Error'] };
  const [cls, label] = map[status] || map.idle;
  return <span style={{display:'flex',alignItems:'center',gap:6,fontSize:'0.8rem',color:'var(--muted)'}}>
    <span className={`status-dot ${cls}`}/>{label}
  </span>;
}

function LoadingSpinner() {
  return <div style={{display:'flex',alignItems:'center',gap:8,color:'var(--muted)',fontSize:'0.9rem'}}>
    <span className="spinner" style={{fontSize:'1.2rem'}}>⟳</span> Loading...
  </div>;
}

function LiftBar({ value, max=5 }) {
  const pct = Math.min((value/max)*100, 100);
  const color = value >= 3 ? '#10b981' : value >= 2 ? '#3b82f6' : '#64748b';
  return <div className="lift-bar">
    <div className="lift-fill" style={{width:`${pct}%`, background:color}}/>
  </div>;
}

// ── PAGE: Upload ─────────────────────────────
function UploadPage({ onTrained, trainingStatus }) {
  const [dragging, setDragging] = useState(false);
  const [file, setFile] = useState(null);
  const [uploadMsg, setUploadMsg] = useState(null);
  const [training, setTraining] = useState(false);
  const [params, setParams] = useState({ min_support: 0.01, min_confidence: 0.2, max_len: 3 });
  const [trainResult, setTrainResult] = useState(null);
  const fileRef = useRef();

  const handleFile = async (f) => {
    setFile(f);
    const fd = new FormData();
    fd.append('file', f);
    try {
      const r = await fetch(`${API}/api/upload`, { method:'POST', body:fd });
      const d = await r.json();
      setUploadMsg(d);
    } catch(e) { setUploadMsg({error: e.message}); }
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDragging(false);
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  };

  const handleTrain = async () => {
    setTraining(true); setTrainResult(null);
    try {
      const r = await fetch(`${API}/api/train`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(params)
      });
      const d = await r.json();
      setTrainResult(d);
      if (d.status === 'ready') onTrained();
    } catch(e) { setTrainResult({error:e.message}); }
    setTraining(false);
  };

  return (
    <div className="anim-fade">
      <h2 style={{fontFamily:'Syne',fontWeight:800,fontSize:'1.8rem',marginBottom:8}}>
        Dataset Setup
      </h2>
      <p style={{color:'var(--muted)',marginBottom:28}}>Upload your transaction data or use the built-in demo dataset</p>

      <div className="grid-2">
        <div>
          <div className="card" style={{marginBottom:20}}>
            <div className="card-title">📁 Upload Dataset</div>
            <div
              className={`upload-zone ${dragging?'drag-over':''}`}
              onDragOver={e=>{e.preventDefault();setDragging(true)}}
              onDragLeave={()=>setDragging(false)}
              onDrop={handleDrop}
              onClick={()=>fileRef.current.click()}
            >
              <div className="upload-icon">📊</div>
              <div style={{fontFamily:'Syne',fontWeight:700,fontSize:'1.1rem',marginBottom:8}}>
                {file ? file.name : 'Drop CSV file here'}
              </div>
              <div style={{color:'var(--muted)',fontSize:'0.85rem'}}>
                Columns: transaction_id, product, date, customer_id
              </div>
              <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])} />
            </div>

            {uploadMsg && (
              <div style={{marginTop:16,padding:12,borderRadius:10,background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.3)',fontSize:'0.82rem'}}>
                {uploadMsg.error
                  ? <span style={{color:'#f87171'}}>❌ {uploadMsg.error}</span>
                  : <span style={{color:'#34d399'}}>✅ Uploaded: {uploadMsg.rows} rows, {uploadMsg.columns?.length} columns</span>}
              </div>
            )}
          </div>

          <div className="card" style={{background:'rgba(16,185,129,0.05)',borderColor:'rgba(16,185,129,0.2)'}}>
            <div className="card-title" style={{color:'#34d399'}}>✅ Demo Dataset Ready</div>
            <p style={{fontSize:'0.83rem',color:'var(--muted)',marginBottom:12}}>
              2,000 transactions · 59 products · 6 categories · 12-month seasonality
            </p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {['Electronics','Office','Beverages','Snacks','Health','Fitness'].map(c =>
                <span key={c} className="badge badge-green">{c}</span>
              )}
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-title">⚙️ Training Parameters</div>

          <div className="param-row">
            <div className="param-label">
              Min Support <span className="param-value">{params.min_support}</span>
            </div>
            <input type="range" className="range-input" min="0.005" max="0.1" step="0.005"
              value={params.min_support}
              onChange={e=>setParams(p=>({...p,min_support:parseFloat(e.target.value)}))}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.72rem',color:'var(--muted)'}}>
              <span>0.005 (more rules)</span><span>0.1 (fewer rules)</span>
            </div>
          </div>

          <div className="param-row">
            <div className="param-label">
              Min Confidence <span className="param-value">{params.min_confidence}</span>
            </div>
            <input type="range" className="range-input" min="0.1" max="0.9" step="0.05"
              value={params.min_confidence}
              onChange={e=>setParams(p=>({...p,min_confidence:parseFloat(e.target.value)}))}/>
          </div>

          <div className="param-row">
            <div className="param-label">
              Max Itemset Length <span className="param-value">{params.max_len}</span>
            </div>
            <input type="range" className="range-input" min="2" max="5" step="1"
              value={params.max_len}
              onChange={e=>setParams(p=>({...p,max_len:parseInt(e.target.value)}))}/>
          </div>

// ── Product Network Graph ────────────────────
function ProductGraph({ graphData }) {
  const svgRef = useRef();
  const [tooltip, setTooltip] = useState(null);

  useEffect(() => {
    if (!graphData || !svgRef.current) return;
    const { nodes, edges } = graphData;
    if (nodes.length === 0) return;

    const W = svgRef.current.clientWidth || 700;
    const H = 380;

    // Force-directed layout (simple spring simulation)
    const nodeMap = {};
    const pos = {};
    nodes.forEach((n, i) => {
      const angle = (i / nodes.length) * 2 * Math.PI;
      const r = 130 + Math.random() * 50;
      pos[n.id] = { x: W/2 + r*Math.cos(angle), y: H/2 + r*Math.sin(angle), ...n };
      nodeMap[n.id] = n;
    });

    // Simple layout iterations
    for (let iter = 0; iter < 50; iter++) {
      // Repulsion
      nodes.forEach(a => {
        nodes.forEach(b => {
          if (a.id === b.id) return;
          const dx = pos[a.id].x - pos[b.id].x;
          const dy = pos[a.id].y - pos[b.id].y;
          const d = Math.sqrt(dx*dx+dy*dy) + 0.1;
          const f = 800 / (d*d);
          pos[a.id].x += dx/d * f;
          pos[a.id].y += dy/d * f;
        });
      });
      // Attraction (edges)
      edges.forEach(e => {
        if (!pos[e.source] || !pos[e.target]) return;
        const dx = pos[e.target].x - pos[e.source].x;
        const dy = pos[e.target].y - pos[e.source].y;
        const d = Math.sqrt(dx*dx+dy*dy) + 0.1;
        const f = 0.05;
        pos[e.source].x += dx * f;
        pos[e.source].y += dy * f;
        pos[e.target].x -= dx * f;
        pos[e.target].y -= dy * f;
      });
      // Clamp
      Object.values(pos).forEach(p => {
        p.x = Math.max(40, Math.min(W-40, p.x));
        p.y = Math.max(30, Math.min(H-30, p.y));
      });
    }

    // Render
    const maxConn = Math.max(...nodes.map(n=>n.connections||1));
    const maxLift = Math.max(...edges.map(e=>e.weight||1));

    const svg = svgRef.current;
    svg.innerHTML = '';
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    // Edges
    edges.forEach(e => {
      if (!pos[e.source] || !pos[e.target]) return;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', pos[e.source].x);
      line.setAttribute('y1', pos[e.source].y);
      line.setAttribute('x2', pos[e.target].x);
      line.setAttribute('y2', pos[e.target].y);
      const opacity = 0.2 + (e.weight/maxLift)*0.6;
      line.setAttribute('stroke', '#3b82f6');
      line.setAttribute('stroke-width', 1 + (e.weight/maxLift)*2);
      line.setAttribute('stroke-opacity', opacity);
      svg.appendChild(line);
    });

    // Nodes
    nodes.forEach(n => {
      const p = pos[n.id];
      const r = 6 + (n.connections/maxConn)*14;
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');
      g.style.cursor = 'pointer';

      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', p.x);
      circle.setAttribute('cy', p.y);
      circle.setAttribute('r', r);
      const hue = (n.connections/maxConn);
      const color = hue > 0.7 ? '#06b6d4' : hue > 0.4 ? '#3b82f6' : '#8b5cf6';
      circle.setAttribute('fill', color);
      circle.setAttribute('fill-opacity', '0.8');
      circle.setAttribute('stroke', color);
      circle.setAttribute('stroke-width', '1.5');
      circle.setAttribute('stroke-opacity', '0.5');

      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x', p.x);
      text.setAttribute('y', p.y + r + 12);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('font-size', '9');
      text.setAttribute('fill', 'rgba(226,232,240,0.7)');
      text.setAttribute('font-family', 'DM Sans');
      text.textContent = n.label;

      g.appendChild(circle);
      g.appendChild(text);
      svg.appendChild(g);
    });
  }, [graphData]);

  return (
    <div className="graph-container">
      <svg ref={svgRef} className="graph-svg" />
    </div>
  );
}

// ── PAGE: Recommendations ────────────────────
function RecommendPage() {
  const { data: productsData } = useApi('/api/products', []);
  const { data: graphData } = useApi('/api/graph?top_n=40', []);
  const [cart, setCart] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [dragging, setDragging] = useState(null);
  const [recs, setRecs] = useState(null);
  const [loading, setLoading] = useState(false);
  const [searchTerm, setSearchTerm] = useState('');

  const products = productsData?.products || [];
  const filtered = products.filter(p => p.toLowerCase().includes(searchTerm.toLowerCase()) && !cart.includes(p));

  const addToCart = (product) => {
    if (!cart.includes(product)) setCart(c => [...c, product]);
  };

  const removeFromCart = (product) => setCart(c => c.filter(x => x !== product));

  const getRecommendations = async () => {
    if (cart.length === 0) return;
    setLoading(true);
    try {
      const r = await fetch(`${API}/api/recommend`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ cart, n_recommendations: 6 })
      });
      setRecs(await r.json());
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  useEffect(() => {
    if (cart.length > 0) getRecommendations();
    else setRecs(null);
  }, [cart]);

  const handleDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    if (dragging) addToCart(dragging);
    setDragging(null);
  };

  const recTypeColors = { upsell: 'badge-gold', cross_sell: 'badge-cyan' };

  return (
    <div className="anim-fade">
      <h2 style={{fontFamily:'Syne',fontWeight:800,fontSize:'1.8rem',marginBottom:8}}>Recommendation Engine</h2>
      <p style={{color:'var(--muted)',marginBottom:24}}>Drag products into your cart to get AI-powered upsell & cross-sell suggestions</p>

      <div className="grid-2" style={{marginBottom:20}}>
        {/* Product Catalog */}
        <div className="card">
          <div className="card-title">📦 Product Catalog</div>
          <input className="input" placeholder="Search products..." style={{marginBottom:12}}
            value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
          <div style={{display:'flex',flexWrap:'wrap',gap:8,maxHeight:260,overflowY:'auto'}}>
            {filtered.map((p,i) => (
              <div key={p} className={`product-chip ${chipFor(i)}`}
                draggable
                onDragStart={()=>setDragging(p)}
                onDragEnd={()=>setDragging(null)}
                onClick={()=>addToCart(p)}
              >
                {p} <span style={{opacity:0.6,fontSize:'0.7rem'}}>+</span>
              </div>
            ))}
            {filtered.length === 0 && <span style={{color:'var(--muted)',fontSize:'0.85rem'}}>No products found</span>}
          </div>
        </div>

        {/* Shopping Cart */}
        <div className="card">
          <div className="card-title">
            🛒 Your Cart
            {cart.length > 0 && <span className="badge badge-blue">{cart.length} items</span>}
          </div>
          <div className={`cart-area ${dragOver?'drag-over':''}`}
            onDragOver={e=>{e.preventDefault();setDragOver(true)}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={handleDrop}
          >
            {cart.length === 0
              ? <span style={{color:'var(--muted)',fontSize:'0.85rem',margin:'auto'}}>
                  Drag & drop products here or click to add
                </span>
              : cart.map((p,i) => (
                <div key={p} className={`product-chip ${chipFor(i)}`}>
                  {p}
                  <button className="chip-remove" onClick={()=>removeFromCart(p)}>✕</button>
                </div>
              ))
            }
          </div>
          {cart.length > 0 && (
            <button className="btn btn-primary" style={{marginTop:12,width:'100%',justifyContent:'center'}}
              onClick={getRecommendations} disabled={loading}>
              {loading ? <><span className="spinner">⟳</span> Analyzing...</> : '🔮 Get Recommendations'}
            </button>
          )}
        </div>
      </div>

      {/* Recommendations */}
      {recs && (
        <div className="anim-fade">
          {recs.upsell?.length > 0 && (
            <div className="card" style={{marginBottom:16}}>
              <div className="card-title">⬆️ Upsell Suggestions
                <span className="badge badge-gold">High Value</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
                {recs.upsell.map((r,i) => (
                  <div key={i} className="rec-card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div className="rec-title">{r.product}</div>
                      <button className="btn btn-secondary" style={{padding:'4px 10px',fontSize:'0.75rem'}}
                        onClick={()=>addToCart(r.product)}>+ Add</button>
                    </div>
                    <div className="metric-row">
                      <span className="badge badge-gold">Lift: {fmt(r.lift)}</span>
                      <span className="badge badge-blue">Conf: {fmt(r.confidence*100,0)}%</span>
                      <span className="badge badge-green">Sup: {fmt(r.support*100,1)}%</span>
                    </div>
                    <div className="rec-explain">{r.explanation}</div>
                    <div style={{fontSize:'0.72rem',color:'var(--muted)'}}>
                      Triggered by: {r.trigger?.join(', ')}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {recs.cross_sell?.length > 0 && (
            <div className="card" style={{marginBottom:16}}>
              <div className="card-title">↔️ Cross-Sell Suggestions
                <span className="badge badge-cyan">Complementary</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
                {recs.cross_sell.map((r,i) => (
                  <div key={i} className="rec-card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div className="rec-title">{r.product}</div>
                      <button className="btn btn-secondary" style={{padding:'4px 10px',fontSize:'0.75rem'}}
                        onClick={()=>addToCart(r.product)}>+ Add</button>
                    </div>
                    <div className="metric-row">
                      <span className="badge badge-cyan">Lift: {fmt(r.lift)}</span>
                      <span className="badge badge-blue">Conf: {fmt(r.confidence*100,0)}%</span>
                    </div>
                    <div className="rec-explain">{r.explanation}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {recs.upsell?.length === 0 && recs.cross_sell?.length === 0 && (
            <div className="card" style={{textAlign:'center',padding:40}}>
              <div style={{fontSize:'2rem',marginBottom:8}}>🤔</div>
              <div style={{color:'var(--muted)'}}>No strong associations found for this cart combination.</div>
              <div style={{color:'var(--muted)',fontSize:'0.82rem',marginTop:4}}>Try adding more products or lowering the confidence threshold.</div>
            </div>
          )}
        </div>
      )}

      {/* Product Network */}
      {graphData && (
        <div className="card" style={{marginTop:20}}>
          <div className="card-title">🕸️ Product Relationship Network
            <span className="badge badge-purple">{graphData.nodes?.length} nodes · {graphData.edges?.length} edges</span>
          </div>
          <p style={{fontSize:'0.82rem',color:'var(--muted)',marginBottom:12}}>
            Node size = connection strength · Edge opacity = lift score · Blue→Cyan = high to medium connectivity
          </p>
          <ProductGraph graphData={graphData} />
        </div>
      )}
    </div>
  );
}

  const navItems = [
    { id: 'upload', label: '📤 Setup', always: true },
    { id: 'dashboard', label: '📊 Dashboard' },
    { id: 'recommend', label: '🔮 Recommendations' },
  ];

  return (
    <div className="app">
      <div className="grid-bg" />
      <div className="orb orb1" />
      <div className="orb orb2" />
      <div className="orb orb3" />

      <nav className="navbar">
        <div className="logo">◈ BasketAI</div>
        <div className="nav-links">
          {navItems.map(item => (
            <button key={item.id}
              className={`nav-btn ${page===item.id?'active':''}`}
              onClick={()=>setPage(item.id)}
              disabled={!item.always && trainedStatus !== 'ready'}
              style={{opacity: !item.always && trainedStatus !== 'ready' ? 0.4 : 1}}
            >
              {item.label}
            </button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <StatusBadge status={trainedStatus} />
          <button className="theme-btn" onClick={()=>setDarkMode(d=>!d)}>
            {darkMode ? '☀️' : '🌙'}
          </button>
        </div>
      </nav>

      <main className="main">
        {page === 'upload' && <UploadPage onTrained={onTrained} trainingStatus={trainedStatus} />}
        {page === 'dashboard' && trainedStatus === 'ready' && <DashboardPage />}
        {page === 'recommend' && trainedStatus === 'ready' && <RecommendPage />}
        {page !== 'upload' && trainedStatus !== 'ready' && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            height:400,gap:16,color:'var(--muted)',textAlign:'center'}}>
            <div style={{fontSize:'3rem'}}>🚀</div>
            <div style={{fontFamily:'Syne',fontSize:'1.3rem',color:'var(--text)'}}>Train a model first</div>
            <div style={{fontSize:'0.88rem'}}>Go to Setup and click "Train All Models"</div>
            <button className="btn btn-primary" onClick={()=>setPage('upload')}>Go to Setup →</button>
          </div>
        )}
      </main>

      <footer style={{padding:'16px 32px',borderTop:'1px solid var(--border)',
        color:'var(--muted)',fontSize:'0.78rem',textAlign:'center',
        background:'var(--glass)',backdropFilter:'blur(20px)'}}>
        BasketAI · Market Basket Intelligence Platform · Apriori + FP-Growth + ECLAT
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
